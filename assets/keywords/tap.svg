<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Tap cost coin. Palette matches the colorless (C) keyword-ability coin
       (render.js KW_NATIVE_COLORS.C): cream disc #ece0be, slate glyph #3a3f47,
       slate inner ring #3a3f47, cream outer ring #ece0be. Colors are hardcoded
       (not CSS vars) because this ships as a background-image for .mana-T, which
       renders in an isolated context that can't inherit vars — keep in sync by
       hand if the C keyword palette changes. -->
  <defs>
    <clipPath id="clip"><circle cx="20" cy="20" r="16.5"/></clipPath>
    <radialGradient id="shine" cx="36%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.22"/>
    </radialGradient>
  </defs>
  <circle cx="20" cy="20" r="17" fill="#ece0be"/>
  <circle cx="20" cy="20" r="17" fill="url(#shine)"/>
  <g clip-path="url(#clip)">
    <g fill="#3a3f47">
    <rect x="9" y="8" width="22" height="3" rx="1"/>
    <rect x="9" y="31" width="22" height="3" rx="1"/>
    <path d="M10,11 L30,11 L20,25 Z"/>
    <path d="M10,31 L30,31 L20,17 Z"/>
  </g>
  </g>
  <circle cx="20" cy="20" r="17" fill="none" stroke="#3a3f47" stroke-width="2"/>
  <circle cx="20" cy="20" r="19" fill="none" stroke="#ece0be" stroke-width="1.8"/>
</svg>
